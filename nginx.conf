upstream nestjs-server {
    server nestjs-server:3002;
}
server {

    listen       80;
    server_name  www.momostudy.com; 
    # 指向 docker-compose.yml 中挂载的容器内前端文件目录
    root   /usr/share/nginx/html/client;
    index  index.html index.htm;
    location / {
        # 解决单页应用 (SPA) 前端路由刷新报 404 的问题
        try_files $uri $uri/ /index.html;
    }

    # 匹配所有以 /api/ 开头的请求
    location /api/ {
        proxy_pass http://nestjs-server/;
        
        # 将客户端的真实访问信息传递给 NestJS 后端
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时时间
        proxy_connect_timeout 60;
        proxy_send_timeout 60;
        proxy_read_timeout 60;
    }

    # 公开资源 - 直接放行
    location ^~ /fileStore/users/ {
        alias /usr/share/nginx/html/fileStore/users/;
        expires 7d;
    }
    location ^~ /fileStore/public/ {
        alias /usr/share/nginx/html/fileStore/public/;
    }

    # 私有资源 - 需要鉴权
    location ^~ /fileStore/schools/ {
        # 内部转发到鉴权接口
        auth_request /api/auth/checkFilePermission;
        alias /usr/share/nginx/html/fileStore/schools/;
        # 视频流支持
        mp4;
        add_header Accept-Ranges bytes;
        # 鉴权后的缓存策略
        expires 3d;
    }

    # 内部鉴权转发
    location = /api/auth/checkFilePermission {
        internal; # 仅限内部调用
        proxy_pass http://nestjs-server/auth/checkFilePermission; # 指向 NestJS 鉴权接口
        
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        
        # 传递原始信息给 NestJS
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
    }

    # 对常见的静态文件开启浏览器强缓存，提升页面二次加载速度
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root   /usr/share/nginx/html/client;
        expires 30d; # 缓存 30 天
        add_header Cache-Control "public, no-transform";
    }

    # ==========================================
    # 4. 服务器错误页面配置
    # ==========================================
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html/client;
    }
}

server {

    listen       80;
    server_name  admin.momostudy.com; 
    root   /usr/share/nginx/html/admin;
    index  index.html index.htm;
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://nestjs-server/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60;
        proxy_send_timeout 60;
        proxy_read_timeout 60;
    }

    location ^~ /fileStore/ {
        auth_request /api/auth/checkFilePermission;
        alias /usr/share/nginx/html/fileStore/;
        mp4;
        expires 3d;
    }

    location = /api/auth/checkFilePermission {
        internal;
        proxy_pass http://nestjs-server/auth/checkFilePermission;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root   /usr/share/nginx/html/admin;
        expires 30d; # 缓存 30 天
        add_header Cache-Control "public, no-transform";
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html/admin;
    }
}