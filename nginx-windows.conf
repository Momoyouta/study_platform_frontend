upstream nestjs-server {
    server host.docker.internal:3001;
}

upstream vite-dev-client-server {
    server host.docker.internal:8080;
}

upstream vite-dev-admin-server {
    server host.docker.internal:8081;
}

# ==========================================
# 客户端前台配置 (www.momostudy.dev)
# ==========================================
server {
    listen       80;
    server_name  www.momostudy.test; 
    
    # 【修改点 1】注释掉 root，开发环境不需要从硬盘读文件
    # root   /usr/share/nginx/html/client;
    # index  index.html index.htm;

    location / {
        # 【修改点 2】将所有前端页面请求代理到本地 Vite 客户端服务
        proxy_pass http://vite-dev-client-server;
        
        # 【修改点 3】必须添加这三行，开启 WebSocket 代理，否则 Vite 的代码热更新 (HMR) 会失效
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # 匹配所有以 /api/ 开头的请求
    location /api/ {
        proxy_pass http://nestjs-server/;
        
        # 将客户端的真实访问信息传递给 NestJS 后端
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时时间
        proxy_connect_timeout 60;
        proxy_send_timeout 60;
        proxy_read_timeout 60;
    }

    # 公开资源 - 直接放行
    location ^~ /fileStore/users/ {
        alias /usr/share/nginx/html/fileStore/users/;
        expires 7d;
    }
    location ^~ /fileStore/public/ {
        alias /usr/share/nginx/html/fileStore/public/;
    }

    # 私有资源 - 需要鉴权
    location ^~ /fileStore/schools/ {
        # 内部转发到鉴权接口
        auth_request /api/auth/checkFilePermission;
        alias /usr/share/nginx/html/fileStore/schools/;
        # 视频流支持
        mp4;
        add_header Accept-Ranges bytes;
        # 鉴权后的缓存策略
        expires 3d;
    }

    # 内部鉴权转发
    location = /api/auth/checkFilePermission {
        internal; # 仅限内部调用
        proxy_pass http://nestjs-server/auth/checkFilePermission; # 指向 NestJS 鉴权接口
        
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        
        # 传递原始信息给 NestJS
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
    }

    # 【修改点 4】注释掉静态文件强缓存拦截！
    # 开发模式下，js/css/图片等资源全部由 Vite 在内存中处理并实时刷新。
    # 如果不注释掉，Nginx 会尝试去硬盘找这些文件从而导致全站 404。
    # location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    #     root   /usr/share/nginx/html/client;
    #     expires 30d; 
    #     add_header Cache-Control "public, no-transform";
    # }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html/client;
    }
}

# ==========================================
# 管理端后台配置 (admin.momostudy.dev)
# ==========================================
server {
    listen       80;
    server_name  admin.momostudy.test; 
    
    # root   /usr/share/nginx/html/admin;
    # index  index.html index.htm;

    location / {
        # 指向 Admin 的 Vite 服务
        proxy_pass http://vite-dev-admin-server;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://nestjs-server/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60;
        proxy_send_timeout 60;
        proxy_read_timeout 60;
    }

    location ^~ /fileStore/ {
        auth_request /api/auth/checkFilePermission;
        alias /usr/share/nginx/html/fileStore/;
        mp4;
        expires 3d;
    }

    location = /api/auth/checkFilePermission {
        internal;
        proxy_pass http://nestjs-server/auth/checkFilePermission;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
    }

    # 同样注释掉 Admin 的静态文件缓存拦截
    # location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ { ... }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html/admin;
    }
}